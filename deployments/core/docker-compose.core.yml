services:
  db:
    image: postgres:16-alpine
    container_name: insider-core-db
    restart: unless-stopped
    env_file:
      - .env.core
    ports:
      - "5433:5432"
    volumes:
      - insider_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 30
    networks: [insider-net]

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: insider-core-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.core
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      RULES_PATH: /app/rules/rules.yaml
    ports:
      - "8003:8000"
    command: >
      sh -lc "poetry run alembic upgrade head &&
              poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks: [insider-net]

volumes:
  insider_pg:

networks:
  insider-net:
    name: insider-net
