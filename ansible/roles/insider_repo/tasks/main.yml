---
- name: Clone Insider Detect repository
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ repo_dir }}"
    version: "{{ repo_version }}"
    force: true

- name: Ensure repository owner is vagrant
  ansible.builtin.file:
    path: "{{ repo_dir }}"
    owner: vagrant
    group: vagrant
    recurse: true